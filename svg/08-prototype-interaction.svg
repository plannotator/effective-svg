<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 165 202" width="165" height="202" role="img" aria-label="Abstract illustration of a sidebar list with a row being dragged and a clay drop indicator">
  <style>
    svg{stroke-linejoin:round}
    .bg{fill:#F0EEE6}
    .frame{fill:#FFFFFF;stroke:#D1CFC5;stroke-width:1.2}
    .wh{fill:#FFFFFF;stroke:#9C9B93;stroke-width:1.4}
    .whh{fill:#FFFFFF;stroke:#D1CFC5;stroke-width:1.2}
    .oa{fill:#E3DACC;stroke:#B7AE9D;stroke-width:1.2}
    .sl{fill:#141413}
    .cl{fill:#D97757}
    .ol{fill:#788C5D}
    .fl{fill:#D1CFC5}
    .fll{fill:#E6E3DA}
    .st{fill:none;stroke:#87867F;stroke-width:1.4}
    .stt{fill:none;stroke:#6F6E68;stroke-width:2}
    .hl{fill:none;stroke:#D1CFC5;stroke-width:1}
    .ln{fill:none;stroke:#9C9B93;stroke-width:1.3;stroke-linecap:round}
    .lnf{fill:none;stroke:#CFCDC3;stroke-width:1.1;stroke-linecap:round}
    .lc{fill:none;stroke:#D97757;stroke-width:1.5;stroke-linecap:round}
    .da{stroke-dasharray:3 3}
  </style>
  <rect x="0" y="0" width="165" height="202" class="bg"/>

<!-- Sidebar list card -->
<rect x="12" y="12" width="141" height="112" rx="5" class="wh"/>
<line x1="22" y1="23" x2="44" y2="23" class="ln"/>
<line x1="137" y1="23" x2="143" y2="23" class="hl"/>
<line x1="22" y1="29.5" x2="143" y2="29.5" class="hl"/>

<!-- Row 1 (settled) -->
<g>
  <circle cx="24" cy="38" r="1" class="fl"/><circle cx="28" cy="38" r="1" class="fl"/>
  <circle cx="24" cy="41.5" r="1" class="fl"/><circle cx="28" cy="41.5" r="1" class="fl"/>
  <circle cx="24" cy="45" r="1" class="fl"/><circle cx="28" cy="45" r="1" class="fl"/>
  <line x1="36" y1="40" x2="74" y2="40" class="ln"/>
  <line x1="36" y1="44" x2="57" y2="44" class="lnf"/>
  <line x1="134" y1="41.5" x2="143" y2="41.5" class="lnf"/>
</g>

<!-- Clay drop indicator (single focal accent) -->
<circle cx="20" cy="54" r="2.2" class="cl"/>
<rect x="22" y="53.1" width="121" height="1.8" rx="0.9" class="cl"/>

<!-- Row 2 (settled) -->
<g>
  <circle cx="24" cy="64" r="1" class="fl"/><circle cx="28" cy="64" r="1" class="fl"/>
  <circle cx="24" cy="67.5" r="1" class="fl"/><circle cx="28" cy="67.5" r="1" class="fl"/>
  <circle cx="24" cy="71" r="1" class="fl"/><circle cx="28" cy="71" r="1" class="fl"/>
  <line x1="36" y1="66" x2="70" y2="66" class="ln"/>
  <line x1="36" y1="70" x2="52" y2="70" class="lnf"/>
  <line x1="134" y1="67.5" x2="143" y2="67.5" class="lnf"/>
</g>

<!-- Lifted / dragging row (tilted oat card, raised) -->
<g transform="rotate(2.5 88 89)">
  <rect x="32" y="81" width="112" height="16" rx="3.5" class="oa"/>
  <circle cx="42" cy="85.5" r="1" class="fl"/><circle cx="46" cy="85.5" r="1" class="fl"/>
  <circle cx="42" cy="89" r="1" class="fl"/><circle cx="46" cy="89" r="1" class="fl"/>
  <circle cx="42" cy="92.5" r="1" class="fl"/><circle cx="46" cy="92.5" r="1" class="fl"/>
  <line x1="54" y1="87" x2="100" y2="87" class="ln"/>
  <line x1="54" y1="91" x2="79" y2="91" class="lnf"/>
</g>

<!-- Row 4 (settled, faint vacated slot) -->
<g>
  <circle cx="24" cy="108" r="1" class="fll"/><circle cx="28" cy="108" r="1" class="fll"/>
  <circle cx="24" cy="111.5" r="1" class="fll"/><circle cx="28" cy="111.5" r="1" class="fll"/>
  <line x1="36" y1="109.75" x2="63" y2="109.75" class="lnf"/>
  <line x1="134" y1="109.75" x2="143" y2="109.75" class="hl"/>
</g>

<!-- Notes / annotation panel -->
<rect x="12" y="132" width="141" height="58" rx="5" class="whh"/>
<line x1="22" y1="143" x2="57" y2="143" class="ln"/>
<line x1="22" y1="149.5" x2="143" y2="149.5" class="hl"/>

<rect x="22" y="156" width="2.8" height="2.8" rx="0.8" class="fl"/>
<line x1="30" y1="157.4" x2="139" y2="157.4" class="lnf"/>

<rect x="22" y="165" width="2.8" height="2.8" rx="0.8" class="fl"/>
<line x1="30" y1="166.4" x2="131" y2="166.4" class="lnf"/>

<rect x="22" y="174" width="2.8" height="2.8" rx="0.8" class="ol"/>
<line x1="30" y1="175.4" x2="121" y2="175.4" class="lnf"/>
<line x1="30" y1="179.5" x2="96" y2="179.5" class="lnf"/>
</svg>
