<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 165 202" width="165" height="202" role="img" aria-label="Abstract incident report: a severity tag and headline above a vertical timeline with a clay impact dot and olive resolved dot, a dark code-diff panel, and a checklist of action items">
  <style>
    svg{stroke-linejoin:round}
    .bg{fill:#F0EEE6}
    .frame{fill:#FFFFFF;stroke:#D1CFC5;stroke-width:1.2}
    .wh{fill:#FFFFFF;stroke:#9C9B93;stroke-width:1.4}
    .whh{fill:#FFFFFF;stroke:#D1CFC5;stroke-width:1.2}
    .oa{fill:#E3DACC;stroke:#B7AE9D;stroke-width:1.2}
    .sl{fill:#141413}
    .cl{fill:#D97757}
    .ol{fill:#788C5D}
    .fl{fill:#D1CFC5}
    .fll{fill:#E6E3DA}
    .st{fill:none;stroke:#87867F;stroke-width:1.4}
    .stt{fill:none;stroke:#6F6E68;stroke-width:2}
    .hl{fill:none;stroke:#D1CFC5;stroke-width:1}
    .ln{fill:none;stroke:#9C9B93;stroke-width:1.3;stroke-linecap:round}
    .lnf{fill:none;stroke:#CFCDC3;stroke-width:1.1;stroke-linecap:round}
    .lc{fill:none;stroke:#D97757;stroke-width:1.5;stroke-linecap:round}
    .da{stroke-dasharray:3 3}
  </style>
  <rect x="0" y="0" width="165" height="202" class="bg"/>

<!-- Header: incident id rule, severity pill, status pill, title -->
<rect x="12" y="13" width="26" height="3" rx="1.5" class="fll"/>
<rect x="12" y="21" width="21" height="8" rx="3" class="cl"/>
<rect x="37" y="21" width="25" height="8" rx="3" class="oa"/>
<line x1="12" y1="38" x2="98" y2="38" class="ln"/>
<line x1="12" y1="43" x2="72" y2="43" class="lnf"/>

<!-- Timeline spine with dots -->
<line x1="20" y1="55" x2="20" y2="103" class="hl"/>
<circle cx="20" cy="55" r="2.2" class="fl"/>
<line x1="29" y1="55" x2="73" y2="55" class="ln"/>
<circle cx="20" cy="71" r="3" class="cl"/>
<line x1="29" y1="69.5" x2="90" y2="69.5" class="ln"/>
<line x1="29" y1="74.5" x2="66" y2="74.5" class="lnf"/>
<circle cx="20" cy="87" r="2.2" class="fl"/>
<line x1="29" y1="87" x2="78" y2="87" class="ln"/>
<circle cx="20" cy="103" r="3" class="ol"/>
<line x1="29" y1="101.5" x2="84" y2="101.5" class="ln"/>
<line x1="29" y1="106.5" x2="58" y2="106.5" class="lnf"/>

<!-- Code-diff panel (root cause): outlined card, tiny window triad -->
<rect x="12" y="118" width="141" height="38" rx="4.5" class="wh"/>
<circle cx="18.5" cy="124" r="1.4" class="sl"/>
<circle cx="23" cy="124" r="1.4" class="fll"/>
<circle cx="27.5" cy="124" r="1.4" class="fll"/>
<line x1="17" y1="132" x2="48" y2="132" class="lnf"/>
<line x1="17" y1="137.5" x2="74" y2="137.5" class="lnf"/>
<rect x="14.5" y="141" width="3" height="4" rx="1" class="cl"/>
<line x1="21" y1="143" x2="86" y2="143" class="ln"/>
<line x1="17" y1="148.5" x2="64" y2="148.5" class="lnf"/>

<!-- Action-item checklist card -->
<rect x="12" y="162" width="141" height="32" rx="4.5" class="whh"/>
<rect x="18" y="167" width="6" height="6" rx="2" class="ol"/>
<line x1="28" y1="170" x2="92" y2="170" class="ln"/>
<rect x="18" y="177" width="6" height="6" rx="2" class="st"/>
<line x1="28" y1="180" x2="104" y2="180" class="ln"/>
<rect x="18" y="187" width="6" height="6" rx="2" class="st"/>
<line x1="28" y1="190" x2="80" y2="190" class="lnf"/>
</svg>
