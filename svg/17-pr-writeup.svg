<rect class="oa" x="105" y="17" width="7" height="7" rx="2"/>
<line class="lnf" x1="116" y1="20.5" x2="145" y2="20.5"/>
<rect class="fll" x="105" y="31" width="7" height="7" rx="2"/>
<line class="lnf" x1="116" y1="34.5" x2="138" y2="34.5"/>

<!-- TL;DR callout with clay accent edge -->
<rect class="whh" x="12" y="50" width="141" height="22" rx="4"/>
