<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 165 202" width="165" height="202" role="img" aria-label="Animated abstract illustration of a sidebar list with a row being dragged and a clay drop indicator">
  <style>
    svg{stroke-linejoin:round}
    .bg{fill:#F0EEE6}
    .frame{fill:#FFFFFF;stroke:#D1CFC5;stroke-width:1.2}
    .wh{fill:#FFFFFF;stroke:#9C9B93;stroke-width:1.4}
    .whh{fill:#FFFFFF;stroke:#D1CFC5;stroke-width:1.2}
    .oa{fill:#E3DACC;stroke:#B7AE9D;stroke-width:1.2}
    .sl{fill:#141413}
    .cl{fill:#D97757}
    .ol{fill:#788C5D}
    .fl{fill:#D1CFC5}
    .fll{fill:#E6E3DA}
    .st{fill:none;stroke:#87867F;stroke-width:1.4}
    .stt{fill:none;stroke:#6F6E68;stroke-width:2}
    .hl{fill:none;stroke:#D1CFC5;stroke-width:1}
    .ln{fill:none;stroke:#9C9B93;stroke-width:1.3;stroke-linecap:round}
    .lnf{fill:none;stroke:#CFCDC3;stroke-width:1.1;stroke-linecap:round}
    .lc{fill:none;stroke:#D97757;stroke-width:1.5;stroke-linecap:round}
    .da{stroke-dasharray:3 3}
  </style>
  <style>
    /* HERO: slider thumb sweeps the full track and back; toggle flips on at the apex; clay drop indicator pulses a ripple of feedback */

@keyframes a-sweep {
  0%   { transform: translateX(0); }
  44%  { transform: translateX(101px); }
  56%  { transform: translateX(101px); }
  100% { transform: translateX(0); }
}
.a-thumb {
  transform-box: fill-box;
  transform-origin: center;
  animation: a-sweep 5s cubic-bezier(.5,.05,.3,1) infinite;
}

/* the clay fill of the track follows the thumb by scaling its width */
@keyframes a-fill {
  0%   { transform: scaleX(.04); }
  44%  { transform: scaleX(1); }
  56%  { transform: scaleX(1); }
  100% { transform: scaleX(.04); }
}
.a-fill {
  transform-box: fill-box;
  transform-origin: left center;
  animation: a-fill 5s cubic-bezier(.5,.05,.3,1) infinite;
}

/* toggle knob base position is ON (right); animation slides it OFF (left) and back at loop ends */
@keyframes a-toggle {
  0%   { transform: translateX(-8.5px); }
  40%  { transform: translateX(-8.5px); }
  50%  { transform: translateX(0); }
  90%  { transform: translateX(0); }
  100% { transform: translateX(-8.5px); }
}
.a-knob {
  transform-box: fill-box;
  transform-origin: center;
  animation: a-toggle 5s cubic-bezier(.55,0,.3,1.4) infinite;
}

/* toggle track olive overlay: base ON (opacity 1); animation fades it OFF then back */
@keyframes a-track-on {
  0%   { opacity: 1; }
  8%   { opacity: 0; }
  44%  { opacity: 0; }
  50%  { opacity: 1; }
  92%  { opacity: 1; }
  100% { opacity: 1; }
}
.a-track-on {
  animation: a-track-on 5s ease-in-out infinite;
}

/* soft ripple feedback emanating from the clay drop indicator dot */
@keyframes a-ripple {
  0%   { transform: scale(.3); opacity: .55; }
  70%  { transform: scale(3.4); opacity: 0; }
  100% { transform: scale(3.4); opacity: 0; }
}
.a-ripple {
  transform-box: fill-box;
  transform-origin: center;
  animation: a-ripple 5s ease-out infinite;
}

/* the clay drop bar gives a gentle highlight pulse on each pass */
@keyframes a-clay-pulse {
  0%   { opacity: 1; }
  44%  { opacity: 1; }
  52%  { opacity: .55; }
  60%  { opacity: 1; }
  100% { opacity: 1; }
}
.a-clay {
  animation: a-clay-pulse 5s ease-in-out infinite;
}

@media (prefers-reduced-motion: reduce) {
  .a-thumb, .a-fill, .a-knob, .a-track-on, .a-ripple, .a-clay { animation: none; }
}
    @media (prefers-reduced-motion: reduce){
      *{animation:none!important;transition:none!important}
      [class*="a-"],[id*="a-"]{opacity:1!important;transform:none!important;stroke-dashoffset:0!important;stroke-dasharray:none!important}
    }
  </style>
  <rect x="0" y="0" width="165" height="202" class="bg"/>

<!-- Sidebar list card -->
<rect x="12" y="12" width="141" height="112" rx="5" class="wh"/>
<line x1="22" y1="23" x2="44" y2="23" class="ln"/>
<line x1="137" y1="23" x2="143" y2="23" class="hl"/>
<line x1="22" y1="29.5" x2="143" y2="29.5" class="hl"/>

<!-- Row 1 (settled) -->
<g>
  <circle cx="24" cy="38" r="1" class="fl"/><circle cx="28" cy="38" r="1" class="fl"/>
  <circle cx="24" cy="41.5" r="1" class="fl"/><circle cx="28" cy="41.5" r="1" class="fl"/>
  <circle cx="24" cy="45" r="1" class="fl"/><circle cx="28" cy="45" r="1" class="fl"/>
  <line x1="36" y1="40" x2="74" y2="40" class="ln"/>
  <line x1="36" y1="44" x2="57" y2="44" class="lnf"/>
  <line x1="134" y1="41.5" x2="143" y2="41.5" class="lnf"/>
</g>

<!-- Clay drop indicator (single focal accent) -->
<circle cx="20" cy="54" r="2.2" class="cl a-ripple"/>
<circle cx="20" cy="54" r="2.2" class="cl"/>
<rect x="22" y="53.1" width="121" height="1.8" rx="0.9" class="cl a-clay"/>

<!-- Row 2 (settled) -->
<g>
  <circle cx="24" cy="64" r="1" class="fl"/><circle cx="28" cy="64" r="1" class="fl"/>
  <circle cx="24" cy="67.5" r="1" class="fl"/><circle cx="28" cy="67.5" r="1" class="fl"/>
  <circle cx="24" cy="71" r="1" class="fl"/><circle cx="28" cy="71" r="1" class="fl"/>
  <line x1="36" y1="66" x2="70" y2="66" class="ln"/>
  <line x1="36" y1="70" x2="52" y2="70" class="lnf"/>
  <line x1="134" y1="67.5" x2="143" y2="67.5" class="lnf"/>
</g>

<!-- Lifted / dragging row (tilted oat card, raised) -->
<g transform="rotate(2.5 88 89)">
  <rect x="32" y="81" width="112" height="16" rx="3.5" class="oa"/>
  <circle cx="42" cy="85.5" r="1" class="fl"/><circle cx="46" cy="85.5" r="1" class="fl"/>
  <circle cx="42" cy="89" r="1" class="fl"/><circle cx="46" cy="89" r="1" class="fl"/>
  <circle cx="42" cy="92.5" r="1" class="fl"/><circle cx="46" cy="92.5" r="1" class="fl"/>
  <line x1="54" y1="87" x2="100" y2="87" class="ln"/>
  <line x1="54" y1="91" x2="79" y2="91" class="lnf"/>
</g>

<!-- Row 4 (settled, faint vacated slot) -->
<g>
  <circle cx="24" cy="108" r="1" class="fll"/><circle cx="28" cy="108" r="1" class="fll"/>
  <circle cx="24" cy="111.5" r="1" class="fll"/><circle cx="28" cy="111.5" r="1" class="fll"/>
  <line x1="36" y1="109.75" x2="63" y2="109.75" class="lnf"/>
  <line x1="134" y1="109.75" x2="143" y2="109.75" class="hl"/>
</g>

<!-- Notes / annotation panel -->
<rect x="12" y="132" width="141" height="58" rx="5" class="whh"/>
<line x1="22" y1="143" x2="57" y2="143" class="ln"/>
<line x1="22" y1="149.5" x2="143" y2="149.5" class="hl"/>

<!-- Slider control (hero): track + clay fill + sweeping thumb -->
<line x1="30" y1="157.4" x2="139" y2="157.4" class="lnf"/>
<rect x="30" y="156.65" width="105" height="1.5" rx="0.75" class="cl a-fill"/>
<g class="a-thumb">
  <circle cx="33" cy="157.4" r="2.6" class="cl"/>
</g>

<line x1="30" y1="166.4" x2="131" y2="166.4" class="lnf"/>

<!-- Toggle control (hero companion): track flips olive, knob slides on -->
<rect x="22" y="174" width="2.8" height="2.8" rx="0.8" class="ol"/>
<line x1="30" y1="175.4" x2="121" y2="175.4" class="lnf"/>
<line x1="30" y1="179.5" x2="96" y2="179.5" class="lnf"/>
<g>
  <rect x="127" y="173.6" width="13" height="6.4" rx="3.2" class="fll"/>
  <rect x="127" y="173.6" width="13" height="6.4" rx="3.2" class="ol a-track-on"/>
  <g class="a-knob">
    <circle cx="135.3" cy="176.8" r="2.4" class="wh"/>
  </g>
</g>
</svg>
