<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 165 202" width="165" height="202" role="img" aria-label="Animated Abstract incident report: a severity tag and headline above a vertical timeline with a clay impact dot and olive resolved dot, a dark code-diff panel, and a checklist of action items">
  <style>
    svg{stroke-linejoin:round}
    .bg{fill:#F0EEE6}
    .frame{fill:#FFFFFF;stroke:#D1CFC5;stroke-width:1.2}
    .wh{fill:#FFFFFF;stroke:#9C9B93;stroke-width:1.4}
    .whh{fill:#FFFFFF;stroke:#D1CFC5;stroke-width:1.2}
    .oa{fill:#E3DACC;stroke:#B7AE9D;stroke-width:1.2}
    .sl{fill:#141413}
    .cl{fill:#D97757}
    .ol{fill:#788C5D}
    .fl{fill:#D1CFC5}
    .fll{fill:#E6E3DA}
    .st{fill:none;stroke:#87867F;stroke-width:1.4}
    .stt{fill:none;stroke:#6F6E68;stroke-width:2}
    .hl{fill:none;stroke:#D1CFC5;stroke-width:1}
    .ln{fill:none;stroke:#9C9B93;stroke-width:1.3;stroke-linecap:round}
    .lnf{fill:none;stroke:#CFCDC3;stroke-width:1.1;stroke-linecap:round}
    .lc{fill:none;stroke:#D97757;stroke-width:1.5;stroke-linecap:round}
    .da{stroke-dasharray:3 3}
  </style>
  <style>
    /* Timeline progress fills downward along the spine */
@keyframes a-progress {
  0%   { stroke-dashoffset: 48; }
  35%  { stroke-dashoffset: 0; }
  90%  { stroke-dashoffset: 0; }
  100% { stroke-dashoffset: 48; }
}
.a-spine-fill {
  stroke-dasharray: 48;
  animation: a-progress 4.5s cubic-bezier(0.65,0,0.35,1) infinite;
}

/* Clay alert node pulses strongly */
@keyframes a-alert {
  0%,100% { transform: scale(1); }
  50%     { transform: scale(1.7); }
}
.a-alert {
  transform-box: fill-box;
  transform-origin: center;
  animation: a-alert 2.5s ease-in-out infinite;
}
@keyframes a-halo {
  0%   { transform: scale(1); opacity: 0.55; }
  70%  { transform: scale(3); opacity: 0; }
  100% { transform: scale(3); opacity: 0; }
}
.a-halo {
  transform-box: fill-box;
  transform-origin: center;
  animation: a-halo 2.5s ease-out infinite;
}

/* Timeline event rows arrive as the progress passes them */
@keyframes a-event {
  0%,100% { opacity: 0.35; }
  50%     { opacity: 1; }
}
.a-ev1 { animation: a-event 4.5s ease-in-out infinite; animation-delay: 0.3s; }
.a-ev2 { animation: a-event 4.5s ease-in-out infinite; animation-delay: 0.7s; }
.a-ev3 { animation: a-event 4.5s ease-in-out infinite; animation-delay: 1.1s; }

/* Log lines stream upward in the diff panel */
@keyframes a-stream {
  0%   { transform: translateY(7px); opacity: 0; }
  18%  { transform: translateY(0);   opacity: 1; }
  82%  { transform: translateY(0);   opacity: 1; }
  100% { transform: translateY(-7px); opacity: 0; }
}
.a-log {
  transform-box: fill-box;
  transform-origin: center;
}
.a-log1 { animation: a-stream 3.6s ease-in-out infinite; animation-delay: 0s; }
.a-log2 { animation: a-stream 3.6s ease-in-out infinite; animation-delay: 0.25s; }
.a-log3 { animation: a-stream 3.6s ease-in-out infinite; animation-delay: 0.5s; }
.a-log4 { animation: a-stream 3.6s ease-in-out infinite; animation-delay: 0.75s; }

/* Clay diff marker blinks gently with the stream */
@keyframes a-marker {
  0%,100% { opacity: 1; }
  50%     { opacity: 0.3; }
}
.a-marker { animation: a-marker 3.6s ease-in-out infinite; }

/* Checklist items tick in, cascading */
@keyframes a-check {
  0%,55%  { transform: scale(0.7); opacity: 0.45; }
  68%     { transform: scale(1.25); opacity: 1; }
  80%,100%{ transform: scale(1); opacity: 1; }
}
.a-check {
  transform-box: fill-box;
  transform-origin: center;
}
.a-check1 { animation: a-check 4.5s ease-out infinite; animation-delay: 0s; }
.a-check2 { animation: a-check 4.5s ease-out infinite; animation-delay: 0.4s; }
.a-check3 { animation: a-check 4.5s ease-out infinite; animation-delay: 0.8s; }
    @media (prefers-reduced-motion: reduce){
      *{animation:none!important;transition:none!important}
      [class*="a-"],[id*="a-"]{opacity:1!important;transform:none!important;stroke-dashoffset:0!important;stroke-dasharray:none!important}
    }
  </style>
  <rect x="0" y="0" width="165" height="202" class="bg"/>

<!-- Header: incident id rule, severity pill, status pill, title -->
<rect x="12" y="13" width="26" height="3" rx="1.5" class="fll"/>
<rect x="12" y="21" width="21" height="8" rx="3" class="cl"/>
<rect x="37" y="21" width="25" height="8" rx="3" class="oa"/>
<line x1="12" y1="38" x2="98" y2="38" class="ln"/>
<line x1="12" y1="43" x2="72" y2="43" class="lnf"/>

<!-- Timeline spine with dots -->
<line x1="20" y1="55" x2="20" y2="103" class="hl"/>
<line x1="20" y1="55" x2="20" y2="103" class="lc a-spine-fill"/>
<circle cx="20" cy="55" r="2.2" class="fl"/>
<g class="a-ev1">
<line x1="29" y1="55" x2="73" y2="55" class="ln"/>
</g>
<circle cx="20" cy="71" r="3" class="cl a-halo"/>
<circle cx="20" cy="71" r="3" class="cl a-alert"/>
<g class="a-ev2">
<line x1="29" y1="69.5" x2="90" y2="69.5" class="ln"/>
<line x1="29" y1="74.5" x2="66" y2="74.5" class="lnf"/>
</g>
<circle cx="20" cy="87" r="2.2" class="fl"/>
<g class="a-ev3">
<line x1="29" y1="87" x2="78" y2="87" class="ln"/>
</g>
<circle cx="20" cy="103" r="3" class="ol"/>
<line x1="29" y1="101.5" x2="84" y2="101.5" class="ln"/>
<line x1="29" y1="106.5" x2="58" y2="106.5" class="lnf"/>

<!-- Code-diff panel (root cause): outlined card, tiny window triad -->
<rect x="12" y="118" width="141" height="38" rx="4.5" class="wh"/>
<circle cx="18.5" cy="124" r="1.4" class="sl"/>
<circle cx="23" cy="124" r="1.4" class="fll"/>
<circle cx="27.5" cy="124" r="1.4" class="fll"/>
<line x1="17" y1="132" x2="48" y2="132" class="lnf a-log a-log1"/>
<line x1="17" y1="137.5" x2="74" y2="137.5" class="lnf a-log a-log2"/>
<rect x="14.5" y="141" width="3" height="4" rx="1" class="cl a-marker"/>
<line x1="21" y1="143" x2="86" y2="143" class="ln a-log a-log3"/>
<line x1="17" y1="148.5" x2="64" y2="148.5" class="lnf a-log a-log4"/>

<!-- Action-item checklist card -->
<rect x="12" y="162" width="141" height="32" rx="4.5" class="whh"/>
<rect x="18" y="167" width="6" height="6" rx="2" class="ol a-check a-check1"/>
<line x1="28" y1="170" x2="92" y2="170" class="ln"/>
<rect x="18" y="177" width="6" height="6" rx="2" class="st a-check a-check2"/>
<line x1="28" y1="180" x2="104" y2="180" class="ln"/>
<rect x="18" y="187" width="6" height="6" rx="2" class="st a-check a-check3"/>
<line x1="28" y1="190" x2="80" y2="190" class="lnf"/>
</svg>
