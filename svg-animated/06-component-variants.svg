<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 165 202" width="165" height="202" role="img" aria-label="Animated abstract component variants gallery: a control toolbar above a grid of card variants and a dark code snippet panel">
  <style>
    svg{stroke-linejoin:round}
    .bg{fill:#F0EEE6}
    .frame{fill:#FFFFFF;stroke:#D1CFC5;stroke-width:1.2}
    .wh{fill:#FFFFFF;stroke:#9C9B93;stroke-width:1.4}
    .whh{fill:#FFFFFF;stroke:#D1CFC5;stroke-width:1.2}
    .oa{fill:#E3DACC;stroke:#B7AE9D;stroke-width:1.2}
    .sl{fill:#141413}
    .cl{fill:#D97757}
    .ol{fill:#788C5D}
    .fl{fill:#D1CFC5}
    .fll{fill:#E6E3DA}
    .st{fill:none;stroke:#87867F;stroke-width:1.4}
    .stt{fill:none;stroke:#6F6E68;stroke-width:2}
    .hl{fill:none;stroke:#D1CFC5;stroke-width:1}
    .ln{fill:none;stroke:#9C9B93;stroke-width:1.3;stroke-linecap:round}
    .lnf{fill:none;stroke:#CFCDC3;stroke-width:1.1;stroke-linecap:round}
    .lc{fill:none;stroke:#D97757;stroke-width:1.5;stroke-linecap:round}
    .da{stroke-dasharray:3 3}
  </style>
  <style>
    /* A clay selection ring cross-fades variant to variant (A,B,C,D), like
       browsing the matrix. OPACITY ONLY — no translate, no scale, nothing can
       leave its frame. The matching accent dot lights on the active variant,
       and the unselected cards quietly dim. */
.a-sel{opacity:0}
.a-selA{animation:a-selA 9s ease-in-out infinite}
.a-selB{animation:a-selB 9s ease-in-out infinite}
.a-selC{animation:a-selC 9s ease-in-out infinite}
.a-selD{animation:a-selD 9s ease-in-out infinite}
@keyframes a-selA{0%,3%{opacity:1}22%,97%{opacity:0}100%{opacity:1}}
@keyframes a-selB{0%,22%{opacity:0}28%,47%{opacity:1}53%,100%{opacity:0}}
@keyframes a-selC{0%,47%{opacity:0}53%,72%{opacity:1}78%,100%{opacity:0}}
@keyframes a-selD{0%,72%{opacity:0}78%,97%{opacity:1}100%{opacity:0}}

/* accent dot lights on the active variant (same cadence as its ring) */
.a-dot{opacity:0}
.a-dotA{animation:a-selA 9s ease-in-out infinite}
.a-dotB{animation:a-selB 9s ease-in-out infinite}
.a-dotC{animation:a-selC 9s ease-in-out infinite}
.a-dotD{animation:a-selD 9s ease-in-out infinite}

/* unselected variants quietly dim */
.a-cardA{animation:a-dimA 9s ease-in-out infinite}
.a-cardB{animation:a-dimB 9s ease-in-out infinite}
.a-cardC{animation:a-dimC 9s ease-in-out infinite}
.a-cardD{animation:a-dimD 9s ease-in-out infinite}
@keyframes a-dimA{0%,3%{opacity:1}22%,97%{opacity:.62}100%{opacity:1}}
@keyframes a-dimB{0%,22%{opacity:.62}28%,47%{opacity:1}53%,100%{opacity:.62}}
@keyframes a-dimC{0%,47%{opacity:.62}53%,72%{opacity:1}78%,100%{opacity:.62}}
@keyframes a-dimD{0%,72%{opacity:.62}78%,97%{opacity:1}100%{opacity:.62}}
    @media (prefers-reduced-motion: reduce){
      *{animation:none!important;transition:none!important}
      [class*="a-"],[id*="a-"]{opacity:1!important;transform:none!important;stroke-dashoffset:0!important;stroke-dasharray:none!important}
    }
  </style>
  <rect x="0" y="0" width="165" height="202" class="bg"/>

<!-- Toolbar -->
<rect x="12" y="12" width="141" height="22" rx="4" class="wh"/>
<line x1="19" y1="23" x2="37" y2="23" class="lnf da"/>
<line x1="44" y1="20.5" x2="68" y2="20.5" class="ln"/>
<line x1="44" y1="25.5" x2="60" y2="25.5" class="lnf"/>
<circle cx="78" cy="23" r="1.5" class="sl"/>
<rect x="90" y="18.5" width="11" height="9" rx="2.5" class="whh"/>
<rect x="103" y="18.5" width="11" height="9" rx="2.5" class="oa"/>
<rect x="116" y="18.5" width="11" height="9" rx="2.5" class="whh"/>
<rect x="135" y="18.5" width="9" height="9" rx="2.5" class="cl"/>

<!-- Variant matrix: 2 cols x 3 rows, 12px margins, 5px gutter, 6px row gaps -->
<!-- A: Flat -->
<g class="a-card a-cardA">
<rect x="12" y="42" width="68" height="38" rx="4.5" class="frame"/>
<circle cx="23" cy="53" r="4.5" class="oa"/>
<line x1="31" y1="51" x2="58" y2="51" class="ln"/>
<line x1="31" y1="56" x2="49" y2="56" class="lnf"/>
<rect x="17" y="66" width="14" height="6" rx="3" class="fll"/>
<circle cx="37" cy="69" r="2.2" class="ol"/>
<line x1="17" y1="75.5" x2="33" y2="75.5" class="hl"/>
<circle class="a-dot a-dotA cl" cx="73" cy="48" r="2.6"/>
</g>

<!-- B: Outlined -->
<g class="a-card a-cardB">
<rect x="85" y="42" width="68" height="38" rx="4.5" class="wh"/>
<circle cx="96" cy="53" r="4.5" class="oa"/>
<line x1="104" y1="51" x2="131" y2="51" class="ln"/>
<line x1="104" y1="56" x2="122" y2="56" class="lnf"/>
<rect x="90" y="66" width="14" height="6" rx="3" class="fll"/>
<rect x="107" y="66" width="16" height="6" rx="3" class="fll"/>
<line x1="90" y1="75.5" x2="106" y2="75.5" class="hl"/>
<circle class="a-dot a-dotB cl" cx="146" cy="48" r="2.6"/>
</g>

<!-- C: Elevated (shadow hint) -->
<g class="a-card a-cardC">
<rect x="14" y="88" width="68" height="38" rx="4.5" class="fll"/>
<rect x="12" y="86" width="68" height="38" rx="4.5" class="wh"/>
<circle cx="23" cy="97" r="4.5" class="oa"/>
<line x1="31" y1="95" x2="58" y2="95" class="ln"/>
<line x1="31" y1="100" x2="49" y2="100" class="lnf"/>
<rect x="17" y="110" width="14" height="6" rx="3" class="fll"/>
<rect x="34" y="110" width="16" height="6" rx="3" class="fll"/>
<line x1="17" y1="119.5" x2="33" y2="119.5" class="hl"/>
<circle class="a-dot a-dotC cl" cx="73" cy="92" r="2.6"/>
</g>

<!-- D: Accent stripe -->
<g class="a-card a-cardD">
<rect x="85" y="86" width="68" height="38" rx="4.5" class="wh"/>
<rect x="85" y="86" width="68" height="4" rx="2" class="cl"/>
<circle cx="96" cy="98" r="4.5" class="oa"/>
<line x1="104" y1="96" x2="131" y2="96" class="ln"/>
<line x1="104" y1="101" x2="122" y2="101" class="lnf"/>
<rect x="90" y="111" width="14" height="6" rx="3" class="fll"/>
<rect x="107" y="111" width="16" height="6" rx="3" class="fll"/>
<circle class="a-dot a-dotD cl" cx="146" cy="98" r="2.6"/>
</g>

<!-- E: Inset / filled (oat) -->
<rect x="12" y="132" width="68" height="32" rx="4.5" class="oa"/>
<circle cx="23" cy="144" r="4.5" class="wh"/>
<line x1="31" y1="142" x2="58" y2="142" class="ln"/>
<line x1="31" y1="147" x2="49" y2="147" class="lnf"/>
<rect x="17" y="155" width="14" height="6" rx="3" class="whh"/>
<rect x="34" y="155" width="16" height="6" rx="3" class="whh"/>

<!-- F: Horizontal / compact -->
<rect x="85" y="132" width="68" height="32" rx="4.5" class="wh"/>
<circle cx="96" cy="148" r="5" class="oa"/>
<line x1="105" y1="145" x2="130" y2="145" class="ln"/>
<line x1="105" y1="150" x2="121" y2="150" class="lnf"/>
<rect x="135" y="144" width="11" height="9" rx="2.5" class="whh"/>

<!-- Snippet panel (light outlined) -->
<rect x="12" y="170" width="141" height="16" rx="4" class="whh"/>
<circle cx="18" cy="178" r="1.4" class="cl"/>
<circle cx="23" cy="178" r="1.4" class="fl"/>
<circle cx="28" cy="178" r="1.4" class="fl"/>
<line x1="36" y1="178" x2="52" y2="178" class="ln"/>
<line x1="57" y1="178" x2="79" y2="178" class="lnf"/>
<line x1="84" y1="178" x2="100" y2="178" class="ln"/>
<line x1="105" y1="178" x2="133" y2="178" class="lnf"/>
<line x1="138" y1="178" x2="148" y2="178" class="ln"/>
<line x1="12" y1="192" x2="153" y2="192" class="hl"/>

<!-- clay selection ring: cross-fades through the four variants (opacity only) -->
<rect class="lc a-sel a-selA" x="9" y="39" width="74" height="44" rx="6.5"/>
<rect class="lc a-sel a-selB" x="82" y="39" width="74" height="44" rx="6.5"/>
<rect class="lc a-sel a-selC" x="9" y="83" width="74" height="44" rx="6.5"/>
<rect class="lc a-sel a-selD" x="82" y="83" width="74" height="44" rx="6.5"/>
</svg>
