<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 165 202" width="165" height="202" role="img" aria-label="Animated abstract illustration of a stacked SVG showcase: framed diagram canvases with captions above a palette swatch strip">
  <style>
    svg{stroke-linejoin:round}
    .bg{fill:#F0EEE6}
    .frame{fill:#FFFFFF;stroke:#D1CFC5;stroke-width:1.2}
    .wh{fill:#FFFFFF;stroke:#9C9B93;stroke-width:1.4}
    .whh{fill:#FFFFFF;stroke:#D1CFC5;stroke-width:1.2}
    .oa{fill:#E3DACC;stroke:#B7AE9D;stroke-width:1.2}
    .sl{fill:#141413}
    .cl{fill:#D97757}
    .ol{fill:#788C5D}
    .fl{fill:#D1CFC5}
    .fll{fill:#E6E3DA}
    .st{fill:none;stroke:#87867F;stroke-width:1.4}
    .stt{fill:none;stroke:#6F6E68;stroke-width:2}
    .hl{fill:none;stroke:#D1CFC5;stroke-width:1}
    .ln{fill:none;stroke:#9C9B93;stroke-width:1.3;stroke-linecap:round}
    .lnf{fill:none;stroke:#CFCDC3;stroke-width:1.1;stroke-linecap:round}
    .lc{fill:none;stroke:#D97757;stroke-width:1.5;stroke-linecap:round}
    .da{stroke-dasharray:3 3}
  </style>
  <style>
    @keyframes a-flow{to{stroke-dashoffset:-12}}
.a-flow{animation:a-flow 5s linear infinite}

/* HERO: the three shard nodes orbit as a rotating cluster */
@keyframes a-orbit{to{transform:rotate(360deg)}}
.a-cluster{transform-box:fill-box;transform-origin:center;animation:a-orbit 11s linear infinite}
/* each node counter-rotates so its body stays upright while it circles */
@keyframes a-counter{to{transform:rotate(-360deg)}}
.a-node{transform-box:fill-box;transform-origin:center;animation:a-counter 11s linear infinite}

/* clay merge node: arrives with a confident scale pop each loop, then holds */
@keyframes a-pop{0%{transform:scale(.55);opacity:.6}18%{transform:scale(1.12);opacity:1}30%,100%{transform:scale(1);opacity:1}}
.a-merge{transform-box:fill-box;transform-origin:center;animation:a-pop 5.5s cubic-bezier(.34,1.56,.64,1) infinite}

/* converge connectors sweep-draw toward the merge node */
@keyframes a-draw{0%{stroke-dashoffset:30}24%,100%{stroke-dashoffset:0}}
.a-conv{stroke-dasharray:30;animation:a-draw 5.5s ease-in-out infinite}

/* clay success node: steady breathing focal accent */
@keyframes a-breathe{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.85;transform:scale(1.14)}}
.a-success{transform-box:fill-box;transform-origin:center;animation:a-breathe 3.4s ease-in-out infinite}
    @media (prefers-reduced-motion: reduce){
      *{animation:none!important;transition:none!important}
      [class*="a-"],[id*="a-"]{opacity:1!important;transform:none!important;stroke-dashoffset:0!important;stroke-dasharray:none!important}
    }
  </style>
  <rect x="0" y="0" width="165" height="202" class="bg"/>

<!-- Card 1: framed canvas with a fan-out / merge diagram + caption -->
<rect x="12" y="12" width="141" height="80" rx="5" class="frame"/>
<!-- window-dot triad (canvas chrome) -->
<circle cx="20" cy="19.5" r="1.3" class="hl"/>
<circle cx="24.5" cy="19.5" r="1.3" class="hl"/>
<circle cx="29" cy="19.5" r="1.3" class="cl"/>
<line x1="12" y1="25" x2="153" y2="25" class="hl"/>

<!-- source node -->
<rect x="22" y="48" width="20" height="22" rx="4" class="oa"/>
<!-- fan-out connectors -->
<line x1="42" y1="59" x2="60" y2="42" class="hl"/>
<line x1="42" y1="59" x2="60" y2="59" class="hl"/>
<line x1="42" y1="59" x2="60" y2="76" class="hl"/>

<!-- three shard nodes: rotating cluster (orbit) -->
<g class="a-cluster">
  <g class="a-node">
    <rect x="60" y="35" width="20" height="14" rx="3" class="whh"/>
    <line x1="64" y1="42" x2="75" y2="42" class="lnf"/>
  </g>
  <g class="a-node">
    <rect x="60" y="52" width="20" height="14" rx="3" class="whh"/>
    <line x1="64" y1="59" x2="73" y2="59" class="lnf"/>
  </g>
  <g class="a-node">
    <rect x="60" y="69" width="20" height="14" rx="3" class="whh"/>
    <line x1="64" y1="76" x2="76" y2="76" class="lnf"/>
  </g>
</g>

<!-- converge connectors -->
<line x1="80" y1="42" x2="98" y2="59" class="hl a-conv"/>
<line x1="80" y1="59" x2="98" y2="59" class="hl a-conv"/>
<line x1="80" y1="76" x2="98" y2="59" class="hl a-conv"/>
<!-- merge node (olive accent) -->
<rect x="98" y="48" width="22" height="22" rx="4" class="ol a-merge"/>

<!-- caption below card 1 -->
<line x1="12" y1="100" x2="60" y2="100" class="ln"/>
<line x1="12" y1="106" x2="98" y2="106" class="lnf"/>
<rect x="123" y="97" width="30" height="11" rx="3" class="wh"/>

<!-- Card 2: framed canvas with a retry-timeline diagram + caption -->
<rect x="12" y="120" width="141" height="56" rx="5" class="frame"/>
<!-- baseline grid hairlines under the timeline -->
<line x1="38" y1="133" x2="38" y2="163" class="hl"/>
<line x1="58" y1="133" x2="58" y2="163" class="hl"/>
<line x1="108" y1="133" x2="108" y2="163" class="hl"/>
<!-- timeline axis -->
<line x1="22" y1="158" x2="143" y2="158" class="ln"/>
<!-- backoff retry connectors (dashed) -->
<line x1="38" y1="150" x2="58" y2="150" class="hl da a-flow"/>
<line x1="58" y1="150" x2="108" y2="150" class="hl da a-flow"/>
<line x1="38" y1="150" x2="38" y2="153.5" class="hl da"/>
<line x1="58" y1="150" x2="58" y2="153.5" class="hl da"/>
<line x1="108" y1="150" x2="108" y2="153.5" class="hl da"/>
<!-- attempt 1 fail -->
<circle cx="38" cy="158" r="4" class="wh"/>
<line x1="36" y1="156" x2="40" y2="160" class="hl"/>
<line x1="40" y1="156" x2="36" y2="160" class="hl"/>
<!-- attempt 2 fail -->
<circle cx="58" cy="158" r="4" class="wh"/>
<line x1="56" y1="156" x2="60" y2="160" class="hl"/>
<line x1="60" y1="156" x2="56" y2="160" class="hl"/>
<!-- success node (clay focal accent) -->
<circle cx="108" cy="158" r="5" class="cl a-success"/>

<!-- caption below card 2 -->
<line x1="12" y1="184" x2="58" y2="184" class="ln"/>
<line x1="12" y1="190" x2="90" y2="190" class="lnf"/>

<!-- palette swatch strip -->
<rect x="118" y="181" width="9" height="9" rx="2.5" class="fll"/>
<rect x="130" y="181" width="9" height="9" rx="2.5" class="oa"/>
<rect x="142" y="181" width="9" height="9" rx="2.5" class="wh"/>
<rect x="145" y="184" width="3" height="3" rx="0.8" class="sl"/>
</svg>
