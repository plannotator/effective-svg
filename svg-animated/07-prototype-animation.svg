<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 165 202" width="165" height="202" role="img" aria-label="Animated abstract illustration of an animation prototype bench: a stage with a checkbox row and confetti burst, an easing option panel, and a keyframe timeline.">
  <style>
    svg{stroke-linejoin:round}
    .bg{fill:#F0EEE6}
    .frame{fill:#FFFFFF;stroke:#D1CFC5;stroke-width:1.2}
    .wh{fill:#FFFFFF;stroke:#9C9B93;stroke-width:1.4}
    .whh{fill:#FFFFFF;stroke:#D1CFC5;stroke-width:1.2}
    .oa{fill:#E3DACC;stroke:#B7AE9D;stroke-width:1.2}
    .sl{fill:#141413}
    .cl{fill:#D97757}
    .ol{fill:#788C5D}
    .fl{fill:#D1CFC5}
    .fll{fill:#E6E3DA}
    .st{fill:none;stroke:#87867F;stroke-width:1.4}
    .stt{fill:none;stroke:#6F6E68;stroke-width:2}
    .hl{fill:none;stroke:#D1CFC5;stroke-width:1}
    .ln{fill:none;stroke:#9C9B93;stroke-width:1.3;stroke-linecap:round}
    .lnf{fill:none;stroke:#CFCDC3;stroke-width:1.1;stroke-linecap:round}
    .lc{fill:none;stroke:#D97757;stroke-width:1.5;stroke-linecap:round}
    .da{stroke-dasharray:3 3}
  </style>
  <style>
    @keyframes a-wave{0%,100%{transform:translateY(0) scaleY(1)}25%{transform:translateY(-3px) scaleY(1.28)}50%{transform:translateY(1px) scaleY(.82)}75%{transform:translateY(-2px) scaleY(1.12)}}
@keyframes a-draw{0%{stroke-dashoffset:64}28%{stroke-dashoffset:0}100%{stroke-dashoffset:0}}
@keyframes a-end{0%,18%{transform:scale(0)}30%{transform:scale(1.45)}40%,100%{transform:scale(1)}}
@keyframes a-scrub{0%{transform:translateX(0)}45%{transform:translateX(105px)}50%{transform:translateX(105px)}95%{transform:translateX(0)}100%{transform:translateX(0)}}
@keyframes a-conf1{0%,100%{transform:translateY(0) rotate(35deg)}50%{transform:translateY(-2.5px) rotate(53deg)}}
@keyframes a-conf2{0%,100%{transform:translateY(0) rotate(-50deg)}50%{transform:translateY(-2.5px) rotate(-32deg)}}
@keyframes a-conf3{0%,100%{transform:translateY(0) rotate(60deg)}50%{transform:translateY(-2.5px) rotate(78deg)}}
@keyframes a-conf4{0%,100%{transform:translateY(0) rotate(-40deg)}50%{transform:translateY(-2.5px) rotate(-22deg)}}
@keyframes a-light{0%,100%{opacity:.55}50%{opacity:1}}
.a-wave{animation:a-wave 3.4s cubic-bezier(.45,.05,.55,.95) infinite;transform-box:fill-box;transform-origin:center bottom}
.a-curve{stroke-dasharray:64;animation:a-draw 5s cubic-bezier(.65,0,.35,1) infinite}
.a-end{animation:a-end 5s cubic-bezier(.34,1.56,.64,1) infinite;transform-box:fill-box;transform-origin:center}
.a-head{animation:a-scrub 5s cubic-bezier(.45,.05,.55,.95) infinite;transform-box:fill-box;transform-origin:center}
.a-c1{animation:a-conf1 3s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
.a-c2{animation:a-conf2 3.4s ease-in-out .3s infinite;transform-box:fill-box;transform-origin:center}
.a-c3{animation:a-conf3 3.2s ease-in-out .5s infinite;transform-box:fill-box;transform-origin:center}
.a-c4{animation:a-conf4 3.6s ease-in-out .15s infinite;transform-box:fill-box;transform-origin:center}
.a-kf1{animation:a-light 5s ease-in-out infinite}
.a-kf2{animation:a-light 5s ease-in-out .8s infinite}
.a-kf3{animation:a-light 5s ease-in-out 1.6s infinite}
.a-kf4{animation:a-light 5s ease-in-out 2.4s infinite}
    @media (prefers-reduced-motion: reduce){
      *{animation:none!important;transition:none!important}
      [class*="a-"],[id*="a-"]{opacity:1!important;transform:none!important;stroke-dashoffset:0!important;stroke-dasharray:none!important}
    }
  </style>
  <rect x="0" y="0" width="165" height="202" class="bg"/>
